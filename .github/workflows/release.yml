name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build all platforms
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/winik-cli-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/winik-cli-darwin-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/winik-cli-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/winik-cli-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/winik-cli-windows-amd64.exe .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
